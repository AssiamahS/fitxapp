name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & test (iOS + watchOS)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests on iPhone simulator
        run: |
          set -o pipefail
          xcodebuild test \
            -project FitX.xcodeproj \
            -scheme FitX \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Build watch app standalone
        run: |
          set -o pipefail
          xcodebuild build \
            -project FitX.xcodeproj \
            -scheme FitXWatch \
            -destination 'generic/platform=watchOS Simulator' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

  ipa:
    name: Package unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for device (unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -project FitX.xcodeproj \
            -scheme FitX \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package .ipa
        run: |
          mkdir Payload
          cp -R "build/Build/Products/Release-iphoneos/FitX.app" Payload/
          zip -qry FitX-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: FitX-unsigned-ipa
          path: FitX-unsigned.ipa
          retention-days: 30

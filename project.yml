name: FitX
options:
  bundleIdPrefix: com.assiamah
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: 2.0.17
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: QGMAWHX827
    CODE_SIGN_STYLE: Automatic

targets:
  FitX:
    type: application
    platform: iOS
    sources:
      - FitX
      - Shared
    dependencies:
      - target: FitXWatch
      - target: FitXWidgets
    entitlements:
      path: FitX/FitX.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: FitX/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: FitX
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSSupportsLiveActivities: true
        NSHealthShareUsageDescription: FitX reads your steps and active energy to show daily activity next to your macros.
        NSHealthUpdateUsageDescription: FitX saves your strength workouts to Apple Health.
        NSCameraUsageDescription: FitX uses the camera to scan barcodes and detect foods so you can log macros fast.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.assiamah.fitx
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FitXWatch:
    type: application
    platform: watchOS
    sources:
      - FitXWatch
      - Shared
      - path: FitX/Resources
        buildPhase: resources
    entitlements:
      path: FitXWatch/FitXWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    info:
      path: FitXWatch/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: FitX
        CFBundleIconName: AppIcon
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.assiamah.fitx
        WKRunsIndependentlyOfCompanionApp: true
        WKBackgroundModes: [workout-processing]
        NSHealthShareUsageDescription: FitX reads your heart rate and active energy during workouts.
        NSHealthUpdateUsageDescription: FitX saves your workouts with heart rate to Apple Health.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.assiamah.fitx.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  FitXWidgets:
    type: app-extension
    platform: iOS
    sources:
      - FitXWidgets
      - path: Shared/WorkoutActivityAttributes.swift
    info:
      path: FitXWidgets/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: FitX
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.assiamah.fitx.widgets
        SKIP_INSTALL: true

  FitXTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FitXTests
      - Shared

schemes:
  FitX:
    build:
      targets:
        FitX: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FitXTests
  FitXWatch:
    build:
      targets:
        FitXWatch: all
    run:
      config: Debug
